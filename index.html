<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera PWA - Escáner QR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <!-- Librería jsQR más liviana y confiable -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>📱 Escáner QR PWA</h1>
        <p>Escanea códigos QR y ve la información instantáneamente</p>
        
        <!-- Tarjeta de estado PWA -->
        <div class="status-card">
            <div class="status-item">
                <span class="status-label">Estado PWA:</span>
                <span class="status-value" id="pwaStatus">Verificando...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Service Worker:</span>
                <span class="status-value" id="swStatus">Verificando...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Modo:</span>
                <span class="status-value" id="modeStatus">Navegador</span>
            </div>
        </div>
        
        <!-- Botón de escaneo principal -->
        <button id="scanButton" class="btn btn-primary scan-btn">
            <span class="btn-icon">📷</span>
            Escanear QR
        </button>
        
        <!-- Video para escaneo -->
        <div id="video-container" style="display: none;">
            <video id="qr-video" playsinline></video>
            <canvas id="qr-canvas" style="display: none;"></canvas>
            <div class="video-controls">
                <button id="cancel-scan-btn" class="btn btn-secondary">Cancelar</button>
            </div>
        </div>
        
        <!-- Resultado del escaneo -->
        <div id="result-container" style="display: none;">
            <h3>📄 Resultado del escaneo:</h3>
            <div id="scan-result" class="result-box"></div>
            <button id="new-scan-btn" class="btn btn-primary">Escanear otro QR</button>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
