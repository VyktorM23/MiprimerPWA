<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hospital Ernesto Segundo Paolini - Control de Asistencia</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Pantalla principal -->
        <div id="main-screen" class="main-screen">
            <div class="hospital-title">
                HOSPITAL<br>
                ERNESTO<br>
                SEGUNDO<br>
                PAOLINI
            </div>
            
            <div class="center-buttons">
                <button id="loginButton" class="btn btn-login-main">
                    INICIAR SESION
                </button>
                <button id="scanButton" class="btn btn-scan-main">
                    ESCANEAR
                </button>
            </div>
            
            <div class="bottom-buttons">
                <button id="historyButton" class="btn btn-bottom history-bottom-btn">
                    HISTORIAL
                </button>
                <button id="configButton" class="btn btn-bottom config-bottom-btn">
                    CONFIGURACIÓN
                </button>
            </div>
        </div>
        
        <!-- Pantalla de LOGIN -->
        <div id="login-screen" class="fullscreen-panel" style="display: none;">
            <div class="login-box">
                <h2 class="panel-title">INICIAR SESIÓN</h2>
                <div class="input-group">
                    <input type="text" id="username" class="login-input" placeholder="USUARIO" autocomplete="off">
                </div>
                <div class="input-group">
                    <input type="password" id="password" class="login-input" placeholder="CONTRASEÑA">
                </div>
                <button id="doLoginBtn" class="btn btn-login">INGRESAR</button>
                <button id="cancelLoginBtn" class="btn btn-secondary cancel-login-btn">CANCELAR</button>
                <div id="login-error" class="login-error" style="display: none;">Usuario o contraseña incorrectos</div>
            </div>
        </div>
        
        <!-- Pantalla de menú ADMINISTRADOR (sin botón volver) -->
        <div id="admin-menu-screen" class="fullscreen-panel" style="display: none;">
            <div class="admin-menu-container">
                <h2 class="panel-title">MENÚ ADMINISTRADOR</h2>
                <div class="admin-buttons">
                    <button id="register-employee-btn" class="btn admin-btn register-btn">
                        REGISTRAR EMPLEADO
                    </button>
                    <button id="view-employees-btn" class="btn admin-btn view-btn">
                        VER EMPLEADOS
                    </button>
                </div>
                <button id="logout-from-admin-btn" class="btn btn-logout admin-logout-btn">
                    CERRAR SESIÓN
                </button>
            </div>
        </div>
        
        <!-- Pantalla de CONFIGURACIÓN -->
        <div id="config-screen" class="fullscreen-panel" style="display: none;">
            <h2 class="panel-title">CONFIGURACIÓN</h2>
            <div class="config-buttons">
                <button id="clear-data-btn" class="btn config-btn clear-btn">
                    LIMPIAR DATOS
                </button>
                <button id="about-btn" class="btn config-btn about-btn">
                    ℹ ACERCA DE
                </button>
            </div>
            <button id="back-from-config-btn" class="btn btn-secondary back-btn-full">
                ← VOLVER
            </button>
        </div>
        
        <!-- Pantalla de selección de acción (Entrada/Salida) -->
        <div id="action-selection-screen" class="fullscreen-panel" style="display: none;">
            <h2 class="panel-title">SELECCIONE ACCIÓN</h2>
            <div class="action-buttons">
                <button id="entry-btn" class="btn action-btn entry-btn">
                    ENTRADA
                </button>
                <button id="exit-btn" class="btn action-btn exit-btn">
                    SALIDA
                </button>
            </div>
            <button id="back-from-action-btn" class="btn btn-secondary back-btn-full">
                ← VOLVER
            </button>
        </div>
        
        <!-- Pantalla de lista de empleados -->
        <div id="employees-list-screen" class="fullscreen-panel" style="display: none;">
            <h2 class="panel-title panel-title-top">LISTA DE EMPLEADOS</h2>
            <div class="table-container">
                <table class="employees-table">
                    <thead>
                        <tr>
                            <th>NOMBRE</th>
                            <th>CÉDULA</th>
                        </tr>
                    </thead>
                    <tbody id="employees-table-body">
                        <tr><td colspan="2" class="no-data">No hay empleados registrados</td></tr>
                    </tbody>
                </table>
            </div>
            <button id="back-from-employees-list-btn" class="btn btn-secondary back-btn-full">
                ← VOLVER
            </button>
        </div>
        
        <!-- Pantalla de historial -->
        <div id="history-screen" class="fullscreen-panel" style="display: none;">
            <h2 class="panel-title panel-title-top">ÚLTIMOS REGISTROS</h2>
            <div class="table-container">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>NOMBRE</th>
                            <th>CÉDULA</th>
                            <th>ACCIÓN</th>
                            <th>FECHA Y HORA</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body">
                        <tr><td colspan="4" class="no-data">No hay registros de asistencia</td></tr>
                    </tbody>
                </table>
            </div>
            <button id="back-from-history-btn" class="btn btn-secondary back-btn-full">
                ← VOLVER
            </button>
        </div>
        
        <!-- Video para escaneo -->
        <div id="video-container" style="display: none;">
            <video id="qr-video" playsinline></video>
            <canvas id="qr-canvas" style="display: none;"></canvas>
            <div class="video-controls">
                <button id="cancel-scan-btn" class="btn btn-secondary">CANCELAR</button>
            </div>
        </div>
        
        <!-- Resultado del escaneo -->
        <div id="result-container" class="fullscreen-panel" style="display: none;">
            <div id="scan-result" class="result-box"></div>
        </div>
        
    </div>
    
    <script src="app.js"></script>
</body>
</html>
