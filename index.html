<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Ernesto Segundo Paolini</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <!-- Librería jsQR -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Título del hospital -->
        <div class="hospital-title">
            HOSPITAL<br>
            ERNESTO<br>
            SEGUNDO<br>
            PAOLINI
        </div>
        
        <!-- Botones principales -->
        <div class="buttons-container">
            <button id="loginButton" class="btn btn-primary">
                INICIAR SESION
            </button>
            
            <button id="scanButton" class="btn btn-primary">
                ESCANEAR
            </button>
        </div>
        
        <!-- Video para escaneo (inicialmente oculto) -->
        <div id="video-container" style="display: none;">
            <video id="qr-video" playsinline></video>
            <canvas id="qr-canvas" style="display: none;"></canvas>
            <div class="video-controls">
                <button id="cancel-scan-btn" class="btn btn-secondary">Cancelar</button>
            </div>
        </div>
        
        <!-- Resultado del escaneo (inicialmente oculto) -->
        <div id="result-container" style="display: none;">
            <h3>Resultado del escaneo:</h3>
            <div id="scan-result" class="result-box"></div>
            <button id="new-scan-btn" class="btn btn-primary">Escanear otro QR</button>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
